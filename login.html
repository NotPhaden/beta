<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body>

<div style="max-width:400px;margin:100px auto;">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Parolă">

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz980MG1I3lAxz2Uda9e2D9wkS_03Heb4",
  authDomain: "la-nueva-familia.firebaseapp.com",
  databaseURL: "https://la-nueva-familia-default-rtdb.firebaseio.com",
  projectId: "la-nueva-familia",
  storageBucket: "la-nueva-familia.firebasestorage.app",
  messagingSenderId: "1010039699551",
  appId: "1:1010039699551:web:94f0d076866ef6719ac3ea",
  measurementId: "G-SV8CX861BP"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();


// REGISTER
function register() {

    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, pass)
    .then(userCred => {

        const user = userCred.user;

        db.ref("users/" + user.uid).set({
            email: email,
            username: email.split("@")[0],
            avatar: "https://i.imgur.com/zYxDCQT.png",
            online: true,
            lastSeen: Date.now()
        });

        localStorage.setItem("lnf_current_user", user.uid);

        window.location.href = "index.html";
    })
    .catch(err => alert(err.message));
}


// LOGIN
function login() {

    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, pass)
    .then(userCred => {

        const user = userCred.user;

        db.ref("users/" + user.uid).update({
            online: true,
            lastSeen: Date.now()
        });

        localStorage.setItem("lnf_current_user", user.uid);

        window.location.href = "index.html";
    })
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
