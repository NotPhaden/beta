<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Login - La Nueva Familia</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("background.png") center/cover no-repeat fixed;
}

/* container */
.box {
    max-width: 400px;
    margin: 120px auto;
    padding: 25px;
    border-radius: 18px;
    background: rgba(0,0,0,0.7);
    color: white;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

button:nth-child(3) {
    background: #8b5cf6;
    color: white;
}

button:nth-child(4) {
    background: #22c55e;
    color: white;
}

/* toast */
#toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 20px;
    border-radius: 12px;
    color: white;
    display: none;
    z-index: 9999;
}
</style>
</head>

<body>

<div class="box">
    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Parolă">

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
</div>

<div id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz980MG1I3lAxz2Uda9e2D9wkS_03Heb4",
  authDomain: "la-nueva-familia.firebaseapp.com",
  databaseURL: "https://la-nueva-familia-default-rtdb.firebaseio.com",
  projectId: "la-nueva-familia",
  storageBucket: "la-nueva-familia.firebasestorage.app",
  messagingSenderId: "1010039699551",
  appId: "1:1010039699551:web:94f0d076866ef6719ac3ea"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();


// TOAST
function showToast(msg, color = "#111") {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.style.background = color;
    t.style.display = "block";

    setTimeout(() => {
        t.style.display = "none";
    }, 3000);
}


// REGISTER
function register() {

    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value.trim();

    if (!email || !pass) {
        showToast("Completează toate câmpurile", "#ef4444");
        return;
    }

    auth.createUserWithEmailAndPassword(email, pass)
    .then(userCred => {

        const user = userCred.user;

        db.ref("users/" + user.uid).set({
            email: email,
            username: email.split("@")[0],
            avatar: "https://i.imgur.com/zYxDCQT.png",
            online: true,
            lastSeen: Date.now()
        });

        localStorage.setItem("lnf_current_user", user.uid);

        showToast("Cont creat!", "#22c55e");

        setTimeout(() => {
            window.location.href = "index.html";
        }, 800);

    })
    .catch(err => {
        showToast(err.message, "#ef4444");
    });
}


// LOGIN
function login() {

    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value.trim();

    if (!email || !pass) {
        showToast("Completează toate câmpurile", "#ef4444");
        return;
    }

    auth.signInWithEmailAndPassword(email, pass)
    .then(userCred => {

        const user = userCred.user;

        db.ref("users/" + user.uid).update({
            online: true,
            lastSeen: Date.now()
        });

        localStorage.setItem("lnf_current_user", user.uid);

        showToast("Login reușit!", "#22c55e");

        setTimeout(() => {
            window.location.href = "index.html";
        }, 800);

    })
    .catch(err => {
        showToast("Eroare: " + err.message, "#ef4444");
    });
}
</script>

</body>
</html>
