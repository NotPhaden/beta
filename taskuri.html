<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

.task-box{
    padding:25px;
    border-radius:30px;
    max-width:700px;
}

.task-title{margin-bottom:20px;}

.task-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.task-input{
    width:100%;
    height:52px;
    border:none;
    outline:none;
    border-radius:16px;
    padding:0 18px;
    color:white;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.05);
}

.task-input:focus{
    border-color:rgba(139,92,246,.4);
}

.task-select{
    appearance:none;
}

.task-select option{
    background:#181825;
    color:white;
}

.file-box{
    margin-top:14px;
}

.task-btn{
    width:100%;
    height:54px;
    border:none;
    border-radius:18px;
    cursor:pointer;
    margin-top:15px;

    color:white;
    font-size:15px;
    font-weight:600;

    background:linear-gradient(135deg,#8b5cf6,#a855f7);
}

.task-member{
    text-align:center;
    padding:30px;
}

.member-avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:18px;
}

.view-btn{
    margin-top:18px;
    border:none;
    padding:14px 24px;
    border-radius:16px;
    cursor:pointer;
    color:white;
    background:linear-gradient(135deg,#8b5cf6,#a855f7);
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal-box{
    width:850px;
    max-width:95%;
    max-height:80vh;
    overflow-y:auto;
    border-radius:35px;
    padding:30px;
}

.close-btn{
    float:right;
    cursor:pointer;
    font-size:26px;
}

.task-history-card{
    padding:24px;
    border-radius:25px;
    margin-top:20px;
}

.task-history-card img{
    width:100%;
    margin-top:15px;
    border-radius:18px;
}

</style>

</head>

<body>

<main class="main">

<div class="glass task-box">

<h2 class="task-title">Task nou</h2>

<div class="task-grid">

<input id="taskName" class="task-input" placeholder="Ce task dai?">

<select id="taskRole" class="task-input task-select">

<option value="">Cui i-ai dat task-ul</option>
<option value="Lider">Lider</option>
<option value="Co-Lider">Co-Lider</option>
<option value="Coordonator">Coordonator</option>

</select>

<input id="taskDesc" class="task-input" placeholder="Descriere task">

</div>

<!-- DOVADĂ -->
<div class="file-box">

<input type="text" id="taskLink" class="task-input" placeholder="Link dovadă (opțional)">

<input type="file" id="taskFile" class="task-input" accept="image/*" style="padding:12px; margin-top:10px;">

</div>

<button class="task-btn" onclick="addTask()">
Trimite Task
</button>

</div>

<!-- MEMBERS -->
<div style="margin-top:30px;">
<h2 style="margin-bottom:20px;">Membri Task-uri</h2>
<div class="members-grid" id="memberList"></div>
</div>

</main>

</div>

<!-- MODAL -->
<div id="historyModal" class="modal">

<div class="glass modal-box">

<span class="close-btn" onclick="closeModal()">✕</span>

<h2 id="memberTitle">Istoric Task-uri</h2>

<div id="historyContent"></div>

</div>

</div>

<script>

function convertBase64(file){
return new Promise(resolve=>{
const reader = new FileReader();
reader.readAsDataURL(file);
reader.onload = ()=> resolve(reader.result);
});
}

async function addTask(){

const currentUser =
localStorage.getItem("lnf_current_user");

const name = document.getElementById("taskName").value.trim();
const role = document.getElementById("taskRole").value;
const desc = document.getElementById("taskDesc").value.trim();
const link = document.getElementById("taskLink").value.trim();
const file = document.getElementById("taskFile").files[0];

if(!name || !role || !desc){
alert("Completează câmpurile!");
return;
}

let dovada = link;

if(file){
dovada = await convertBase64(file);
}

let tasks = JSON.parse(localStorage.getItem("lnf_tasks")) || [];

tasks.push({
user: currentUser,
name,
role,
desc,
dovada,
data: new Date().toLocaleString("ro-RO")
});

localStorage.setItem("lnf_tasks", JSON.stringify(tasks));

document.getElementById("taskName").value = "";
document.getElementById("taskRole").value = "";
document.getElementById("taskDesc").value = "";
document.getElementById("taskLink").value = "";
document.getElementById("taskFile").value = "";

loadMembers();
alert("Task trimis!");
}

function loadMembers(){

const tasks = JSON.parse(localStorage.getItem("lnf_tasks")) || [];
const users = JSON.parse(localStorage.getItem("lnf_users")) || [];

const unique = [...new Set(tasks.map(x=>x.user))];

const container = document.getElementById("memberList");
container.innerHTML = "";

unique.forEach(username=>{

const user = users.find(u=>u.username===username);
const avatar = user?.avatar || "https://i.imgur.com/zYxDCQT.png";

container.innerHTML += `
<div class="member-card glass task-member">

<img src="${avatar}" class="member-avatar" onclick="viewHistory('${username}')">

<h2>${username}</h2>

<button class="view-btn" onclick="viewHistory('${username}')">
👁️ Task-uri
</button>

</div>
`;

});
}

function viewHistory(user){

document.getElementById("historyModal").style.display="flex";
document.getElementById("memberTitle").innerText="Task-uri - "+user;

const history=document.getElementById("historyContent");
history.innerHTML="";

const tasks = JSON.parse(localStorage.getItem("lnf_tasks")) || [];

tasks.filter(x=>x.user===user)
.reverse()
.forEach(item=>{

history.innerHTML+=`
<div class="glass task-history-card">

<h3>👤 ${item.user}</h3>

<p>
<b>Task:</b> ${item.name}<br><br>
<b>Rol:</b> ${item.role}<br><br>
<b>Descriere:</b> ${item.desc}<br><br>
<b>Data:</b> ${item.data}
</p>

${item.dovada ? `<img src="${item.dovada}">` : ""}

</div>
`;

});

}

function closeModal(){
document.getElementById("historyModal").style.display="none";
}

loadMembers();

</script>

</body>
