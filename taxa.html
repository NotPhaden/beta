href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>


.tax-box{
    padding:25px;
    border-radius:30px;
    max-width:700px;
}

.tax-title{
    margin-bottom:20px;
}

.tax-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.tax-input{
    width:100%;
    height:52px;
    border:none;
    outline:none;
    border-radius:16px;
    padding:0 18px;
    color:white;
    background:
    rgba(255,255,255,.05);

    border:
    1px solid rgba(255,255,255,.05);
}

.tax-input:focus{
    border-color:
    rgba(139,92,246,.4);
}

.file-box{
    margin-top:14px;
}

.tax-btn{
    width:100%;
    height:54px;
    border:none;
    border-radius:18px;
    cursor:pointer;
    margin-top:15px;

    color:white;
    font-size:15px;
    font-weight:600;

    background:
    linear-gradient(
    135deg,
    #8b5cf6,
    #a855f7);
}

/* MEMBERS */

.tax-member{
    text-align:center;
    padding:30px;
}

.member-avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:18px;
    cursor:pointer;
}

.view-btn{
    margin-top:18px;
    border:none;
    padding:14px 24px;
    border-radius:16px;
    cursor:pointer;
    color:white;

    background:
    linear-gradient(
    135deg,
    #8b5cf6,
    #a855f7);
}


.modal{
    position:fixed;
    inset:0;

    background:
    rgba(0,0,0,.7);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:9999;
}

.modal-box{
    width:850px;
    max-width:95%;
    max-height:80vh;
    overflow-y:auto;

    border-radius:35px;
    padding:30px;
}

.close-btn{
    float:right;
    cursor:pointer;
    font-size:26px;
}

.tax-history-card{
    padding:24px;
    border-radius:25px;
    margin-top:20px;
}

.tax-history-card img{
    width:100%;
    margin-top:18px;
    border-radius:18px;
}

</style>

</head>

<main class="main">

<div class="glass tax-box">

<h2 class="tax-title">
Formular Taxă
</h2>

<div class="tax-grid">

<input
type="text"
id="cnp"
class="tax-input"
placeholder="CNP celui care livrează"
>

<input
type="number"
id="cantitate"
class="tax-input"
placeholder="Cantitate taxă"
>

<input
type="text"
id="unde"
class="tax-input"
placeholder="Unde livrează"
>

<input
type="text"
id="dovadaLink"
class="tax-input"
placeholder="Link dovadă (opțional)"
>

</div>

<div class="file-box">

<input
type="file"
id="dovadaFile"
accept="image/*"
class="tax-input"
style="padding:12px;"
>

</div>

<button
class="tax-btn"
onclick="adaugaTaxa()">

Trimite Taxă

</button>

</div>

<div style="margin-top:30px;">

<h2 style="margin-bottom:20px;">
Membri Taxă
</h2>

<div
class="members-grid"
id="memberList">

</div>

</div>

</main>

</div>

<div
id="historyModal"
class="modal">

<div class="glass modal-box">

<span
class="close-btn"
onclick="closeModal()">

✕

</span>

<h2 id="memberTitle">
Istoric Taxă
</h2>

<div id="historyContent">

</div>

</div>

</div>

<script>

async function adaugaTaxa(){

const currentUser =
localStorage.getItem(
"lnf_current_user"
);

const cnp =
document.getElementById(
"cnp"
).value.trim();

const cantitate =
document.getElementById(
"cantitate"
).value.trim();

const unde =
document.getElementById(
"unde"
).value.trim();

const link =
document.getElementById(
"dovadaLink"
).value.trim();

const file =
document.getElementById(
"dovadaFile"
).files[0];

if(!cnp || !cantitate || !unde){

alert(
"Completează toate câmpurile!"
);

return;
}

let dovada = link;

if(file){

dovada =
await convertBase64(
file
);

}

let taxe =
JSON.parse(
localStorage.getItem(
"lnf_taxe"
)
) || [];

taxe.push({

user:
currentUser,

cnp,
cantitate,
unde,

dovada,

data:
new Date()
.toLocaleString(
"ro-RO"
)

});

localStorage.setItem(
"lnf_taxe",
JSON.stringify(
taxe
)
);

document.getElementById(
"cnp"
).value = "";

document.getElementById(
"cantitate"
).value = "";

document.getElementById(
"unde"
).value = "";

document.getElementById(
"dovadaLink"
).value = "";

document.getElementById(
"dovadaFile"
).value = "";

loadMembers();

alert(
"Taxă trimisă!"
);
}

function convertBase64(file){

return new Promise(
resolve => {

const reader =
new FileReader();

reader.readAsDataURL(
file
);

reader.onload =
() =>
resolve(
reader.result
);

});
}

function loadMembers(){

const taxe =
JSON.parse(
localStorage.getItem(
"lnf_taxe"
)
) || [];

const users =
JSON.parse(
localStorage.getItem(
"lnf_users"
)
) || [];

const uniqueUsers =
[
...new Set(
taxe.map(
x => x.user
)
)
];

const container =
document.getElementById(
"memberList"
);

container.innerHTML = "";

uniqueUsers.forEach(
username => {

const user =
users.find(
u =>
u.username ===
username
);

const avatar =
user?.avatar ||
"https://i.imgur.com/zYxDCQT.png";

container.innerHTML += `

<div class="member-card glass tax-member">

<img
src="${avatar}"
class="member-avatar"
onclick="viewHistory('${username}')"
>

<h2>
${username}
</h2>

<button
class="view-btn"
onclick="viewHistory('${username}')">

👁️ Vizualizează

</button>

</div>

`;

});
}

function viewHistory(user){

document.getElementById(
"historyModal"
).style.display =
"flex";

document.getElementById(
"memberTitle"
).innerText =
"Taxe - " + user;

const history =
document.getElementById(
"historyContent"
);

history.innerHTML = "";

const taxe =
JSON.parse(
localStorage.getItem(
"lnf_taxe"
)
) || [];

const filtered =
taxe.filter(
x =>
x.user === user
);

filtered.reverse()
.forEach(item => {

history.innerHTML += `

<div class="glass tax-history-card">

<h3>
👤 ${item.user}
</h3>

<p>

<b>CNP:</b>
${item.cnp}

<br><br>

<b>Cantitate:</b>
${item.cantitate}

<br><br>

<b>Unde:</b>
${item.unde}

<br><br>

<b>Data:</b>
${item.data}

</p>

${
item.dovada
?
`
<img src="${item.dovada}">
`
:
""
}

</div>

`;

});
}

function closeModal(){

document.getElementById(
"historyModal"
).style.display =
"none";

}

loadMembers();

</script>

</body>
