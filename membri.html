
<head>
        <link rel="icon" type="image/png" href="logo.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Membri - La Nueva Familia</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

.popup-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup-box{
    width:420px;
    max-width:95%;
    border-radius:30px;
    padding:30px;
    text-align:center;
}

.popup-avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:20px;
}

.info-row{
    margin-top:18px;
    padding:16px;
    border-radius:18px;
    background:rgba(255,255,255,.05);
}

.view-btn{
    margin-top:15px;
    border:none;
    padding:14px 22px;
    border-radius:16px;
    cursor:pointer;
    color:white;
    font-weight:600;
    background:linear-gradient(
        135deg,
        #8b5cf6,
        #a855f7
    );
}

.close-btn{
    width:100%;
    margin-top:20px;
    border:none;
    padding:15px;
    border-radius:18px;
    cursor:pointer;
    color:white;
    font-weight:600;
    background:#ef4444;
}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="app">

                Membri

            <a href="uniforma.html">
                <i class="fa-solid fa-shirt"></i>

            </a>

            <a href="locatii.html">

            </a>

            <a href="craftarme.html">
                <i class="fa-solid fa-hammer"></i>

    <div class="main">

        <div class="page-title">
            <h1>Membri Familie</h1>
            <p>Gestionare membri activi</p>
        </div>

        <div class="members-grid" id="membersGrid"></div>

    </div>

</div>

<div class="popup-overlay" id="popup">

    <div class="glass popup-box">

        <img
        id="popupAvatar"
        class="popup-avatar"
        src="">

        <h2 id="popupName">
            User
        </h2>

        <div class="info-row">
            📱 Număr telefon:
            <br>
            <strong id="popupPhone">
                Nesetat
            </strong>
        </div>

        <div class="info-row">
            📋 Task-uri completate:
            <br>
            <strong id="popupTasks">
                0
            </strong>
        </div>

        <button
        class="close-btn"
        onclick="closePopup()">
            Închide
        </button>

    </div>

</div>

<input
type="file"
id="imageInput"
accept="image/*"
hidden>

<script>

const membersGrid =
document.getElementById(
"membersGrid"
);

function renderMembers(){

const users =
JSON.parse(
localStorage.getItem(
"lnf_users"
)
) || [];

membersGrid.innerHTML = "";

users.forEach(user => {

const image =
localStorage.getItem(
`avatar_${user.username}`
)
|| user.avatar
|| "https://i.imgur.com/zYxDCQT.png";

const online =
user.online
? "🟢 Online"
: "🔴 Offline";

membersGrid.innerHTML += `

<div class="member-card glass">

<img
src="${image}"
class="member-avatar"
onclick="changePhoto('${user.username}')">

<h2>${user.username}</h2>

<span class="member-rank">
Member
</span>

<div class="member-status">
${online}
</div>

<button
class="view-btn"
onclick="viewMember('${user.username}')">
👁️ Vizualizează
</button>

</div>

`;

});

}

let selectedUser = null;

function changePhoto(username){

selectedUser = username;

document
.getElementById(
"imageInput"
)
.click();

}

document
.getElementById(
"imageInput"
)
.addEventListener(
"change",
function(e){

const file =
e.target.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload =
function(event){

localStorage.setItem(
`avatar_${selectedUser}`,
event.target.result
);

renderMembers();

}

reader.readAsDataURL(file);

});

function viewMember(username){

const users =
JSON.parse(
localStorage.getItem(
"lnf_users"
)
) || [];

const user =
users.find(
u =>
u.username === username
);

const phone =
localStorage.getItem(
`phone_${username}`
)
|| "Nesetat";

const tasks =
JSON.parse(
localStorage.getItem(
"lnf_tasks"
)
) || [];

const completedTasks =
tasks.filter(
t =>
t.user === username
).length;

const avatar =
localStorage.getItem(
`avatar_${username}`
)
|| user?.avatar
|| "https://i.imgur.com/zYxDCQT.png";

document.getElementById(
"popupAvatar"
).src = avatar;

document.getElementById(
"popupName"
).innerText = username;

document.getElementById(
"popupPhone"
).innerText = phone;

document.getElementById(
"popupTasks"
).innerText =
completedTasks;

document.getElementById(
"popup"
).style.display =
"flex";

}

function closePopup(){

document.getElementById(
"popup"
).style.display =
"none";

}

renderMembers();

</script>

</body>
