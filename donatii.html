<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>


.donation-box{
    padding:25px;
    border-radius:30px;
    max-width:700px;
}

.donation-title{
    margin-bottom:20px;
}

.donation-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.donation-input{
    width:100%;
    height:52px;
    border:none;
    outline:none;
    border-radius:16px;
    padding:0 18px;
    color:white;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.05);
}

.donation-input:focus{
    border-color:rgba(139,92,246,.4);
}


.donation-select{
    color:white;
    background:rgba(255,255,255,.05);

    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
}

.donation-select option{
    background:#181825;
    color:white;
}

.file-box{
    margin-top:14px;
}

.donation-btn{
    width:100%;
    height:54px;
    border:none;
    border-radius:18px;
    cursor:pointer;
    margin-top:15px;

    color:white;
    font-size:15px;
    font-weight:600;

    background:
    linear-gradient(
    135deg,
    #8b5cf6,
    #a855f7);
}


.donation-member{
    text-align:center;
    padding:30px;
}

.member-avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:18px;
}

.view-btn{
    margin-top:18px;
    border:none;
    padding:14px 24px;
    border-radius:16px;
    cursor:pointer;
    color:white;

    background:
    linear-gradient(
    135deg,
    #8b5cf6,
    #a855f7);
}


.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:9999;
}

.modal-box{
    width:850px;
    max-width:95%;
    max-height:80vh;
    overflow-y:auto;

    border-radius:35px;
    padding:30px;
}

.close-btn{
    float:right;
    cursor:pointer;
    font-size:26px;
}

.donation-history-card{
    padding:24px;
    border-radius:25px;
    margin-top:20px;
}

.donation-history-card img{
    width:100%;
    margin-top:18px;
    border-radius:18px;
}

</style>

</head>

<main class="main">

<div class="glass donation-box">

<h2 class="donation-title">
Formular Donație
</h2>

<div class="donation-grid">

<input
type="text"
id="catADonat"
class="donation-input"
placeholder="Ce ai donat?"
>

<select
id="Cui ai donat"
class="donation-input donation-select"
>

<option value="">
Cui ai donat
</option>

<option value="Lider">
Lider
</option>

<option value="Co-Lider">
Co-Lider
</option>

<option value="Coordonator">
Coordonator
</option>

</select>

<input
type="text"
id="dovadaLink"
class="donation-input"
placeholder="Link dovadă (opțional)"
>

</div>

<div class="file-box">

<input
type="file"
id="dovadaFile"
accept="image/*"
class="donation-input"
style="padding:12px;"
>

</div>

<button
class="donation-btn"
onclick="adaugaDonatie()">

Trimite Donație

</button>

</div>

<div style="margin-top:30px;">

<h2 style="margin-bottom:20px;">
Membri Donații
</h2>

<div
class="members-grid"
id="memberList">

</div>

</div>

</main>

</div>

<div
id="historyModal"
class="modal">

<div class="glass modal-box">

<span
class="close-btn"
onclick="closeModal()">

✕

</span>

<h2 id="memberTitle">
Istoric Donații
</h2>

<div id="historyContent"></div>

</div>

</div>

<script>

async function adaugaDonatie(){

const currentUser =
localStorage.getItem(
"lnf_current_user"
);

const suma =
document.getElementById(
"catADonat"
).value.trim();

const cui =
document.getElementById(
"cuiADonat"
).value;

const link =
document.getElementById(
"dovadaLink"
).value.trim();

const file =
document.getElementById(
"dovadaFile"
).files[0];

if(!suma || !cui){

alert(
"Completează toate câmpurile!"
);

return;
}

let dovada = link;

if(file){

dovada =
await convertBase64(file);

}

let donatii =
JSON.parse(
localStorage.getItem(
"lnf_donatii"
)
) || [];

donatii.push({

user: currentUser,
suma,
cui,
dovada,

data:
new Date()
.toLocaleString(
"ro-RO"
)

});

localStorage.setItem(
"lnf_donatii",
JSON.stringify(
donatii
)
);

document.getElementById(
"catADonat"
).value = "";

document.getElementById(
"cuiADonat"
).value = "";

document.getElementById(
"dovadaLink"
).value = "";

document.getElementById(
"dovadaFile"
).value = "";

loadMembers();

alert(
"Donație trimisă!"
);
}

function convertBase64(file){

return new Promise(
resolve => {

const reader =
new FileReader();

reader.readAsDataURL(file);

reader.onload =
() =>
resolve(
reader.result
);

});
}

function loadMembers(){

const donatii =
JSON.parse(
localStorage.getItem(
"lnf_donatii"
)
) || [];

const users =
JSON.parse(
localStorage.getItem(
"lnf_users"
)
) || [];

const uniqueUsers =
[...new Set(
donatii.map(
x => x.user
)
)];

const container =
document.getElementById(
"memberList"
);

container.innerHTML = "";

uniqueUsers.forEach(
username => {

const user =
users.find(
u =>
u.username === username
);

const avatar =
user?.avatar ||
"https://i.imgur.com/zYxDCQT.png";

container.innerHTML += `

<div class="member-card glass donation-member">

<img
src="${avatar}"
class="member-avatar"
onclick="viewHistory('${username}')"
>

<h2>${username}</h2>

<button
class="view-btn"
onclick="viewHistory('${username}')">

👁️ Vizualizează

</button>

</div>

`;

});
}

function viewHistory(user){

document.getElementById(
"historyModal"
).style.display =
"flex";

document.getElementById(
"memberTitle"
).innerText =
"Donații - " + user;

const history =
document.getElementById(
"historyContent"
);

history.innerHTML = "";

const donatii =
JSON.parse(
localStorage.getItem(
"lnf_donatii"
)
) || [];

const filtered =
donatii.filter(
x =>
x.user === user
);

filtered.reverse()
.forEach(item => {

history.innerHTML += `

<div class="glass donation-history-card">

<h3>
👤 ${item.user}
</h3>

<p>

<b>Ce a donat:</b>
${item.suma}

<br><br>

<b>Cui a donat:</b>
${item.cui}

<br><br>

<b>Data:</b>
${item.data}

</p>

${
item.dovada
?
`<img src="${item.dovada}">`
:
""
}

</div>

`;

});
}

function closeModal(){

document.getElementById(
"historyModal"
).style.display =
"none";

}

loadMembers();

</script>
