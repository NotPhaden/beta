<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Nueva Familia Panel</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Poppins, Arial;
    background: url("background.png") center/cover no-repeat fixed;
    color: white;
}

.hidden { display: none; }

#loadingScreen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    z-index: 9999;
}

.app {
    display: flex;
}

.sidebar {
    width: 250px;
    background: rgba(0,0,0,0.7);
    padding: 20px;
    min-height: 100vh;
}

.sidebar a {
    display: block;
    color: white;
    padding: 10px;
    text-decoration: none;
    margin: 5px 0;
}

.sidebar a:hover {
    background: #8b5cf6;
}

.main {
    flex: 1;
    padding: 20px;
}

.card {
    background: rgba(0,0,0,0.6);
    padding: 15px;
    border-radius: 10px;
    margin: 10px 0;
}
</style>
</head>

<body>

<div id="loadingScreen">Se încarcă user...</div>

<div class="app hidden" id="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <h2>LA NUEVA</h2>

        <a href="#"><i class="fa fa-home"></i> Dashboard</a>
        <a href="membri.html">Membri</a>
        <a href="taskuri.html">Taskuri</a>

        <button onclick="logout()">Logout</button>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <div class="card">
            <h2>Bun venit, <span id="accountName">...</span></h2>

            <img id="profileAvatar" width="80" style="border-radius:50%;cursor:pointer">

            <input type="file" id="avatarInput" hidden onchange="changeAvatar(event)">
        </div>

        <div class="card">
            <h3>Membri total: <span id="memberCount">0</span></h3>
            <h3>Membri online: <span id="onlineCount">0</span></h3>
        </div>

        <div class="card">
            <h3>Online members</h3>
            <ul id="onlineMembers"></ul>
        </div>

        <div class="card">
            <h3>Phone: <span id="displayPhone">Nesetat</span></h3>
            <h3>Tasks: <span id="displayTasks">0</span></h3>
        </div>

    </main>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz980MG1I3lAxz2Uda9e2D9wkS_03Heb4",
  authDomain: "la-nueva-familia.firebaseapp.com",
  databaseURL: "https://la-nueva-familia-default-rtdb.firebaseio.com",
  projectId: "la-nueva-familia",
  appId: "1:1010039699551:web:94f0d076866ef6719ac3ea"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let uid = null;


// LOGIN CHECK
auth.onAuthStateChanged(async user => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    uid = user.uid;

    const snap = await db.ref("users/" + uid).get();
    const data = snap.val();

    if (!data) return;

    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("accountName").innerText = data.username;
    document.getElementById("profileAvatar").src = data.avatar;

    db.ref("users/" + uid).update({
        online: true,
        lastSeen: Date.now()
    });

    loadData();
});


// REALTIME DATA
function loadData() {

    db.ref("users").on("value", snap => {

        const users = snap.val() || {};

        let total = 0;
        let online = 0;

        const list = document.getElementById("onlineMembers");
        list.innerHTML = "";

        Object.values(users).forEach(u => {

            total++;

            if (u.online) {
                online++;
                list.innerHTML += `<li>🟢 ${u.username}</li>`;
            }
        });

        document.getElementById("memberCount").innerText = total;
        document.getElementById("onlineCount").innerText = online;
    });


    db.ref("phones/" + uid).on("value", snap => {
        document.getElementById("displayPhone").innerText =
            snap.val()?.phone || "Nesetat";
    });


    db.ref("tasks").on("value", snap => {

        let count = 0;

        snap.forEach(t => {
            if (t.val().user === uid) count++;
        });

        document.getElementById("displayTasks").innerText = count;
    });
}


// AVATAR
document.getElementById("profileAvatar").onclick = () => {
    document.getElementById("avatarInput").click();
};

function changeAvatar(e) {

    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = () => {

        db.ref("users/" + uid).update({
            avatar: reader.result
        });

        document.getElementById("profileAvatar").src = reader.result;
    };

    reader.readAsDataURL(file);
}


// LOGOUT
function logout() {

    db.ref("users/" + uid).update({
        online: false
    });

    auth.signOut();
    window.location.href = "login.html";
}


// OFFLINE FIX
window.addEventListener("beforeunload", () => {

    if (!uid) return;

    db.ref("users/" + uid).update({
        online: false,
        lastSeen: Date.now()
    });
});
</script>

</body>
</html>
