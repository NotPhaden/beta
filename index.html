<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>La Nueva Familia Panel</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("background.png") center/cover no-repeat fixed;
}

.hidden { display: none; }

.sidebar a.active { background: #8b5cf6; color: white; }
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">Se încarcă user...</div>

<!-- APP -->
<div class="app hidden" id="app">

    <aside class="sidebar">

        <h2>Panel</h2>

        <nav>
            <a class="active" href="#">Dashboard</a>
        </nav>

        <button onclick="logout()">Logout</button>
    </aside>

    <main>

        <h2>Bun venit, <span id="accountName">...</span></h2>

        <img id="profileAvatar" width="80" style="border-radius:50%">

        <input type="file" onchange="changeAvatar(event)">

        <h3>Membri: <span id="memberCount">0</span></h3>
        <h3>Online: <span id="onlineCount">0</span></h3>

        <h3>Online list</h3>
        <ul id="onlineMembers"></ul>

        <h3>Phone: <span id="displayPhone"></span></h3>
        <h3>Tasks: <span id="displayTasks"></span></h3>

    </main>
</div>


<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz980MG1I3lAxz2Uda9e2D9wkS_03Heb4",
  authDomain: "la-nueva-familia.firebaseapp.com",
  databaseURL: "https://la-nueva-familia-default-rtdb.firebaseio.com",
  projectId: "la-nueva-familia"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentUID = null;
let currentUser = null;


// LOGIN CHECK
auth.onAuthStateChanged(async user => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    currentUID = user.uid;

    const snap = await db.ref("users/" + currentUID).get();
    currentUser = snap.val();

    if (!currentUser) return;

    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("app").classList.remove("hidden");

    document.getElementById("accountName").innerText = currentUser.username || "User";
    document.getElementById("profileAvatar").src = currentUser.avatar;

    db.ref("users/" + currentUID).update({
        online: true,
        lastSeen: Date.now()
    });

    loadPanel();

});


// LOAD PANEL REALTIME
function loadPanel() {

    db.ref("users").on("value", snap => {

        const users = snap.val() || {};

        let total = Object.keys(users).length;
        let online = 0;

        const list = document.getElementById("onlineMembers");
        list.innerHTML = "";

        Object.values(users).forEach(u => {

            if (u.online) {
                online++;
                list.innerHTML += `<li>🟢 ${u.username}</li>`;
            }

        });

        document.getElementById("memberCount").innerText = total;
        document.getElementById("onlineCount").innerText = online;
    });


    // phone
    db.ref("phones/" + currentUID).on("value", snap => {
        document.getElementById("displayPhone").innerText =
            snap.val()?.phone || "Nesetat";
    });


    // tasks
    db.ref("tasks").on("value", snap => {

        let count = 0;

        snap.forEach(t => {
            if (t.val().user === currentUID) count++;
        });

        document.getElementById("displayTasks").innerText = count;
    });
}


// AVATAR CHANGE
function changeAvatar(e) {

    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = () => {

        db.ref("users/" + currentUID).update({
            avatar: reader.result
        });

        document.getElementById("profileAvatar").src = reader.result;
    };

    reader.readAsDataURL(file);
}


// LOGOUT
function logout() {

    db.ref("users/" + currentUID).update({
        online: false
    });

    auth.signOut();
    window.location.href = "login.html";
}


// OFFLINE FIX
window.addEventListener("beforeunload", () => {

    if (!currentUID) return;

    db.ref("users/" + currentUID).update({
        online: false
    });
});
</script>

</body>
</html>
