<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Nueva Familia Panel</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        #loadingScreen {
            position: fixed;
            inset: 0;
            background: url("background.png") center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 99999;
            color: white;
        }

        #loadingScreen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.65);
        }

        .loading-text {
            position: relative;
            font-size: 28px;
            font-weight: 600;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
    <div class="loading-text">Se încarcă panel...</div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none;">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="logo">
            <h1>LA NUEVA</h1>
            <span>FAMILIA</span>
            <p>MAFIA PANEL</p>
        </div>

        <nav>
            <a class="active" href="index.html"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="membri.html"><i class="fa-solid fa-users"></i> Membri</a>
            <a href="uniforma.html"><i class="fa-solid fa-shirt"></i> Uniformă</a>
            <a href="locatii.html"><i class="fa-solid fa-location-dot"></i> Locații</a>
            <a href="infocraft.html"><i class="fa-solid fa-circle-info"></i> Info-Craft</a>
            <a href="craftarme.html"><i class="fa-solid fa-hammer"></i> Craft Arme</a>
            <a href="taskuri.html"><i class="fa-solid fa-list-check"></i> Task-uri</a>
            <a href="livrari.html"><i class="fa-solid fa-truck"></i> Livrări</a>
            <a href="fonduri.html"><i class="fa-solid fa-money-bill-wave"></i> Fonduri</a>
            <a href="telefon.html"><i class="fa-solid fa-phone"></i> Nr Tel</a>
            <a href="taxa.html"><i class="fa-solid fa-money-bill"></i> Taxă</a>
            <a href="donatii.html"><i class="fa-solid fa-hand-holding-dollar"></i> Donații</a>
        </nav>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- PROFILE -->
        <div class="hero">

            <div class="profile-card glass">

                <img id="profileAvatar"
                     src="https://i.imgur.com/zYxDCQT.png"
                     style="width:90px;height:90px;border-radius:50%;cursor:pointer;"
                     onclick="document.getElementById('avatarInput').click()">

                <input type="file" id="avatarInput" hidden>

                <div>
                    <small>Bun venit,</small>
                    <h2 id="accountName">User</h2>
                    <span class="badge">Member</span>
                </div>

            </div>
        </div>

        <!-- STATS -->
        <div class="stats">

            <div class="card glass">
                <i class="fa-solid fa-users"></i>
                <div>
                    <small>MEMBRI</small>
                    <h2 id="memberCount">0</h2>
                </div>
            </div>

            <div class="card glass">
                <i class="fa-solid fa-signal"></i>
                <div>
                    <small>ONLINE</small>
                    <h2 id="onlineCount">0</h2>
                </div>
            </div>

        </div>

        <!-- DASHBOARD -->
        <div class="dashboard-grid">

            <div class="panel glass">
                <h3>MEMBRI ONLINE</h3>
                <ul id="onlineMembers"></ul>
            </div>

            <div class="panel glass">
                <h3>INFORMAȚII MEMBRU</h3>

                <p><b>Telefon:</b> <span id="displayPhone">Nesetat</span></p>
                <p><b>Task-uri:</b> <span id="displayTasks">0</span></p>

            </div>

        </div>

    </main>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<!-- FIREBASE CONFIG -->
<script>
const firebaseConfig = {
  apiKey: "XXX",
  authDomain: "XXX",
  databaseURL: "XXX",
  projectId: "XXX",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
</script>

<!-- SCRIPT -->
<script>

let currentUser = localStorage.getItem("lnf_current_user");

// redirect dacă nu e logat
if (!currentUser) {
    window.location.href = "login.html";
}

// ================= LOAD USER =================
function loadUser() {
    db.ref("users/" + currentUser).once("value", snap => {

        if (!snap.exists()) return;

        const user = snap.val();

        document.getElementById("accountName").innerText = user.username;
        document.getElementById("profileAvatar").src = user.avatar || "https://i.imgur.com/zYxDCQT.png";

    });
}

// ================= ONLINE UPDATE =================
function setOnline() {
    db.ref("users/" + currentUser).update({
        online: true,
        lastSeen: Date.now()
    });
}

// ================= LOAD STATS =================
function loadStats() {

    db.ref("users").on("value", snap => {

        let users = snap.val() || {};

        let list = Object.values(users);

        document.getElementById("memberCount").innerText = list.length;

        let now = Date.now();

        let online = list.filter(u => u.online && now - u.lastSeen < 20000);

        document.getElementById("onlineCount").innerText = online.length;

        let html = "";

        online.forEach(u => {
            html += `<li>🟢 ${u.username}</li>`;
        });

        document.getElementById("onlineMembers").innerHTML = html;
    });
}

// ================= PHONE =================
function loadPhone() {
    db.ref("phones/" + currentUser).once("value", snap => {
        if (snap.exists()) {
            document.getElementById("displayPhone").innerText = snap.val();
        }
    });
}

// ================= TASKS =================
function loadTasks() {
    db.ref("tasks").once("value", snap => {

        let tasks = snap.val() || {};

        let arr = Object.values(tasks);

        let userTasks = arr.filter(t => t.user === currentUser).length;

        document.getElementById("displayTasks").innerText = userTasks;
    });
}

// ================= AVATAR CHANGE =================
document.getElementById("avatarInput").addEventListener("change", function(e){

    let file = e.target.files[0];
    if (!file) return;

    let reader = new FileReader();

    reader.onload = function() {

        db.ref("users/" + currentUser).update({
            avatar: reader.result
        });

        document.getElementById("profileAvatar").src = reader.result;
    };

    reader.readAsDataURL(file);
});

// ================= HEARTBEAT =================
setInterval(() => {
    setOnline();
}, 5000);

// ================= INIT =================
window.addEventListener("load", () => {

    setTimeout(() => {
        document.getElementById("loadingScreen").style.display = "none";
        document.getElementById("app").style.display = "flex";
    }, 1500);

    loadUser();
    loadStats();
    loadPhone();
    loadTasks();
    setOnline();
});

</script>

</body>
</html>
