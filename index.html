<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Nueva Familia Panel</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: url("background.png") center/cover no-repeat fixed;
}

/* LOADING */
#loadingScreen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    color: white;
    z-index: 9999;
}

/* APP */
#app {
    display: none;
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    height: 100vh;
    position: fixed;
    background: rgba(0,0,0,0.7);
    padding: 20px;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    margin: 10px 0;
}

/* MAIN */
.main {
    margin-left: 240px;
    padding: 20px;
}

.card {
    background: rgba(0,0,0,0.6);
    padding: 15px;
    border-radius: 10px;
    margin: 10px 0;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">Loading...</div>

<!-- APP -->
<div id="app">

    <div class="sidebar">
        <h2>LA NUEVA</h2>
        <h3 id="accountName">User</h3>

        <a href="#">Dashboard</a>
        <a href="membri.html">Membri</a>
        <a href="taskuri.html">Task-uri</a>
    </div>

    <div class="main">

        <div class="card">
            <h2>Dashboard</h2>
            <img id="profileAvatar" width="80">
        </div>

        <div class="card">
            <h3>Statistici</h3>
            <p>Membri: <span id="memberCount">0</span></p>
            <p>Online: <span id="onlineCount">0</span></p>
        </div>

        <div class="card">
            <h3>Online users</h3>
            <ul id="onlineMembers"></ul>
        </div>

    </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDz980MG1I3lAxz2Uda9e2D9wkS_03Heb4",
  authDomain: "la-nueva-familia.firebaseapp.com",
  databaseURL: "https://la-nueva-familia-default-rtdb.firebaseio.com",
  projectId: "la-nueva-familia"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;

/* LOGIN CHECK */
auth.onAuthStateChanged(user => {

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    currentUser = user;

    db.ref("users/" + user.uid).once("value").then(snap => {
        const data = snap.val();

        document.getElementById("accountName").innerText =
            data?.username || user.email;

        document.getElementById("profileAvatar").src =
            data?.avatar || "https://i.imgur.com/zYxDCQT.png";
    });

    db.ref("users/" + user.uid).update({
        online: true,
        lastSeen: Date.now()
    });

    loadDashboard();

    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
});


/* DASHBOARD */
function loadDashboard() {

    db.ref("users").on("value", snap => {

        const users = snap.val() || {};
        const list = Object.values(users);

        document.getElementById("memberCount").innerText = list.length;

        const online = list.filter(u =>
            u.online && (Date.now() - u.lastSeen < 15000)
        );

        document.getElementById("onlineCount").innerText = online.length;

        const ul = document.getElementById("onlineMembers");
        ul.innerHTML = "";

        online.forEach(u => {
            const li = document.createElement("li");
            li.innerText = "🟢 " + (u.username || u.email);
            ul.appendChild(li);
        });
    });
}


/* OFFLINE */
window.addEventListener("beforeunload", () => {

    if (!currentUser) return;

    db.ref("users/" + currentUser.uid).update({
        online: false,
        lastSeen: Date.now()
    });
});
</script>

</body>
</html>
