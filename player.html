]

};

const params = new URLSearchParams(location.search);
const id = params.get("id");

const episodes = (data[id] && data[id].length) ? data[id] : [];

let current = 1;
let server = 1;

const player = document.getElementById("mainPlayer");
const grid = document.getElementById("grid");

function goBack(){
    window.location.href = "index.html";
}

function getUrl(ep){
    if(server === 1) return ep.s1;
    return `https://archive.org/embed/${ep.s2}`;
}

function load(i){
    if(!episodes[i-1]) return;

    current = i;

    if(player){
        player.src = getUrl(episodes[i-1]);
    }

    localStorage.setItem("lastEpisode_" + id, current);

    updateActive();
}

function setServer(s){
    server = s;

    document.querySelectorAll(".server-btn")
    .forEach((b,i)=>{
        b.classList.toggle("active", i===s-1);
    });

    load(current);
}

function generate(){
    grid.innerHTML = "";

    if(!episodes.length){
        grid.innerHTML = "<p style='color:white'>Nu există episoade sau ID invalid.</p>";
        return;
    }

    episodes.forEach((ep,i)=>{

        const div = document.createElement("div");

        div.className = "episode-card player";

        div.innerHTML = `EP ${i+1}`;

        div.onclick = ()=>load(i+1);

        grid.appendChild(div);
    });
}

function updateActive(){
    document.querySelectorAll(".episode-card.player")
    .forEach((c,i)=>{
        c.classList.toggle("active", i===current-1);
    });
}

function nextEpisode(){
    if(current < episodes.length){
        load(current+1);
    }
}

window.addEventListener("DOMContentLoaded", () => {
    generate();

    const saved = localStorage.getItem("lastEpisode_" + id);

    if(saved){
        load(parseInt(saved));
    } else {
        load(1);
    }
});

</script>
