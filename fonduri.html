<title>Fonduri - La Nueva Familia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

.fund-box{
    padding:25px;
    border-radius:30px;
    max-width:800px;
}

.fund-title{
    margin-bottom:20px;
}

.fund-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.fund-input{
    width:100%;
    height:52px;
    border:none;
    outline:none;
    border-radius:16px;
    padding:0 18px;
    color:white;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.05);
}

.fund-input:focus{
    border-color:rgba(139,92,246,.4);
}

.fund-select{
    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
}

.fund-select option{
    background:#181825;
    color:white;
}

.file-box{
    margin-top:14px;
}

.fund-btn{
    width:100%;
    height:54px;
    border:none;
    border-radius:18px;
    cursor:pointer;
    margin-top:15px;

    color:white;
    font-size:15px;
    font-weight:600;

    background:
    linear-gradient(
    135deg,
    #8b5cf6,
    #a855f7);
}

.fund-member{
    text-align:center;
    padding:30px;
}

.member-avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:18px;
}

.view-btn{
    margin-top:18px;
    border:none;
    padding:14px 24px;
    border-radius:16px;
    cursor:pointer;
    color:white;

    background:
    linear-gradient(
    135deg,
    #8b5cf6,
    #a855f7);
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:9999;
}

.modal-box{
    width:850px;
    max-width:95%;
    max-height:80vh;
    overflow-y:auto;

    border-radius:35px;
    padding:30px;
}

.close-btn{
    float:right;
    cursor:pointer;
    font-size:26px;
}

.history-card{
    padding:24px;
    border-radius:25px;
    margin-top:20px;
}

.history-card img{
    width:100%;
    margin-top:18px;
    border-radius:18px;
}

</style>
</head>

<body>

<main class="main">

<div class="glass fund-box">

<h2 class="fund-title">
Formular Fonduri
</h2>

<div class="fund-grid">

<select
id="tipFond"
class="fund-input fund-select">

<option value="">
Selectează fond
</option>

<option value="Fond Familie">
Fond Familie
</option>

<option value="Fond Personal">
Fond Personal
</option>

</select>

<input
type="number"
id="sumaFond"
class="fund-input"
placeholder="Câți bani murdari ai adus?"
>

<input
type="text"
id="dovadaLink"
class="fund-input"
placeholder="Link dovadă (opțional)"
>

</div>

<div class="file-box">

<input
type="file"
id="dovadaFile"
accept="image/*"
class="fund-input"
style="padding:12px;">

</div>

<button
class="fund-btn"
onclick="adaugaFond()">

Trimite Fond

</button>

</div>

<div style="margin-top:30px;">

<h2 style="margin-bottom:20px;">
Membri Fonduri
</h2>

<div
class="members-grid"
id="memberList">
</div>

</div>

</main>
</div>

<div
id="historyModal"
class="modal">

<div class="glass modal-box">

<span
class="close-btn"
onclick="closeModal()">

✕

</span>

<h2 id="memberTitle">
Istoric Fonduri
</h2>

<div id="historyContent"></div>

</div>
</div>

<script>

async function adaugaFond(){

const currentUser =
localStorage.getItem(
"lnf_current_user"
);

const tipFond =
document.getElementById(
"tipFond"
).value;

const suma =
document.getElementById(
"sumaFond"
).value.trim();

const link =
document.getElementById(
"dovadaLink"
).value.trim();

const file =
document.getElementById(
"dovadaFile"
).files[0];

if(!tipFond || !suma){

alert(
"Completează toate câmpurile!"
);

return;
}

let dovada = link;

if(file){

dovada =
await convertBase64(file);

}

let fonduri =
JSON.parse(
localStorage.getItem(
"lnf_fonduri"
)
) || [];

fonduri.push({

user: currentUser,
tipFond,
suma,
dovada,

data:
new Date()
.toLocaleString(
"ro-RO"
)

});

localStorage.setItem(
"lnf_fonduri",
JSON.stringify(
fonduri
)
);

document.getElementById(
"tipFond"
).value = "";

document.getElementById(
"sumaFond"
).value = "";

document.getElementById(
"dovadaLink"
).value = "";

document.getElementById(
"dovadaFile"
).value = "";

loadMembers();

alert(
"Fond trimis!"
);

}

function convertBase64(file){

return new Promise(resolve => {

const reader =
new FileReader();

reader.readAsDataURL(file);

reader.onload =
() =>
resolve(
reader.result
);

});

}

function loadMembers(){

const fonduri =
JSON.parse(
localStorage.getItem(
"lnf_fonduri"
)
) || [];

const users =
JSON.parse(
localStorage.getItem(
"lnf_users"
)
) || [];

const uniqueUsers =
[...new Set(
fonduri.map(
x => x.user
)
)];

const container =
document.getElementById(
"memberList"
);

container.innerHTML = "";

uniqueUsers.forEach(
username => {

const user =
users.find(
u =>
u.username === username
);

const avatar =
user?.avatar ||
"https://i.imgur.com/zYxDCQT.png";

container.innerHTML += `

<div class="member-card glass fund-member">

<img
src="${avatar}"
class="member-avatar"
onclick="viewHistory('${username}')"
>

<h2>${username}</h2>

<button
class="view-btn"
onclick="viewHistory('${username}')">

👁️ Vizualizează

</button>

</div>

`;

});

}

function viewHistory(user){

document.getElementById(
"historyModal"
).style.display =
"flex";

document.getElementById(
"memberTitle"
).innerText =
"Fonduri - " + user;

const history =
document.getElementById(
"historyContent"
);

history.innerHTML = "";

const fonduri =
JSON.parse(
localStorage.getItem(
"lnf_fonduri"
)
) || [];

const filtered =
fonduri.filter(
x =>
x.user === user
);

filtered.reverse()
.forEach(item => {

history.innerHTML += `

<div class="glass history-card">

<h3>
👤 ${item.user}
</h3>

<p>

<b>Tip Fond:</b>
${item.tipFond}

<br><br>

<b>Suma:</b>
${item.suma}$ bani murdari

<br><br>

<b>Data:</b>
${item.data}

</p>

${item.dovada
?
`<img src="${item.dovada}">`
:
""
}

</div>

`;

});

}

function closeModal(){

document.getElementById(
"historyModal"
).style.display =
"none";

}

loadMembers();

</script>

</body>
